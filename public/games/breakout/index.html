<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brick Breaker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;user-select:none}
canvas{display:block;cursor:none;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;
function resize(){W=Math.min(window.innerWidth,480);H=Math.min(window.innerHeight,700);c.width=W;c.height=H;}
resize();window.addEventListener('resize',()=>{resize();if(state==='playing')setupLevel();});

const PADDLE_H=12, BALL_R=()=>W*0.018;
const COLS=8, ROWS=6;
const COLORS=['#ef5350','#ff7043','#ffa726','#fdd835','#66bb6a','#42a5f5','#ab47bc','#ec407a'];

let paddle,ball,bricks,score,lives,best,state,level,raf;
best=+localStorage.getItem('bb_best')||0;

function pw(){return W*0.20;}
function brickW(){return(W-20)/(COLS);}
function brickH(){return H*0.040;}

function Brick(col,row){
  return{x:10+col*brickW(),y:70+row*(brickH()+4),w:brickW()-4,h:brickH(),hp:row<2?2:1,color:COLORS[row%COLORS.length],alive:true};
}

function setupLevel(){
  paddle={x:W/2-pw()/2,y:H-50};
  const br=BALL_R();
  ball={x:W/2,y:H-70,vx:(2+level*0.2)*(Math.random()<0.5?1:-1),vy:-(4+level*0.3),r:br,active:false};
  bricks=[];
  for(let r=0;r<ROWS;r++)for(let col=0;col<COLS;col++)bricks.push(Brick(col,r));
}

function init(){score=0;lives=3;level=1;state='idle';setupLevel();}
init();

// Input
let mx=W/2;
c.addEventListener('mousemove',e=>{const rect=c.getBoundingClientRect();mx=e.clientX-rect.left;});
c.addEventListener('touchmove',e=>{e.preventDefault();const rect=c.getBoundingClientRect();mx=e.touches[0].clientX-rect.left;},{passive:false});
function launch(){
  if(state==='idle'||state==='next'){state='playing';ball.active=true;}
  else if(state==='dead'){init();state='playing';ball.active=true;}
}
c.addEventListener('click',launch);
c.addEventListener('touchstart',e=>{e.preventDefault();launch();},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();launch();}});

function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0a0a1a');g.addColorStop(1,'#1a0a2e');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function drawBricks(){
  bricks.forEach(b=>{
    if(!b.alive)return;
    const g=ctx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
    g.addColorStop(0,b.color);g.addColorStop(1,'rgba(0,0,0,0.4)');
    ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.stroke();
    if(b.hp>1){ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.fillText('2',b.x+b.w/2,b.y+b.h/2+4);}
  });
}

function drawPaddle(){
  const g=ctx.createLinearGradient(paddle.x,paddle.y,paddle.x,paddle.y+PADDLE_H);
  g.addColorStop(0,'#42a5f5');g.addColorStop(1,'#1565c0');
  ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(paddle.x,paddle.y,pw(),PADDLE_H,6);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;ctx.stroke();
}

function drawBall(){
  const g=ctx.createRadialGradient(ball.x-ball.r*0.3,ball.y-ball.r*0.3,0,ball.x,ball.y,ball.r);
  g.addColorStop(0,'#ffffff');g.addColorStop(0.4,'#ffa726');g.addColorStop(1,'#e65100');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
}

function drawHUD(){
  ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font=`${W*0.04}px Arial`;ctx.textAlign='left';
  ctx.fillText('⭐ '+score,10,25);
  ctx.textAlign='right';ctx.fillText('❤️'.repeat(lives),W-10,25);
  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font=`${W*0.033}px Arial`;
  ctx.fillText('LEVEL '+level,W/2,25);
}

function drawOverlay(title,sub){
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,167,38,0.15)';ctx.beginPath();ctx.roundRect(W/2-130,H/2-95,260,185,16);ctx.fill();
  ctx.fillStyle='#ffa726';ctx.font=`bold ${W*0.1}px Arial`;ctx.textAlign='center';
  ctx.shadowColor='#ffa726';ctx.shadowBlur=16;ctx.fillText(title,W/2,H/2-30);ctx.shadowBlur=0;
  ctx.fillStyle='#f0f0f0';ctx.font=`${W*0.05}px Arial`;ctx.fillText(sub,W/2,H/2+12);
  ctx.fillStyle='#fff9c4';ctx.font=`${W*0.038}px Arial`;ctx.fillText(`Best: ${best}`,W/2,H/2+44);
  ctx.fillStyle='rgba(255,167,38,0.9)';ctx.beginPath();ctx.roundRect(W/2-70,H/2+60,140,40,20);ctx.fill();
  ctx.fillStyle='#333';ctx.font=`bold ${W*0.04}px Arial`;ctx.fillText('PLAY',W/2,H/2+87);
}

function update(){
  // paddle
  paddle.x=mx-pw()/2;
  paddle.x=Math.max(0,Math.min(W-pw(),paddle.x));
  if(!ball.active){ball.x=paddle.x+pw()/2;ball.y=paddle.y-ball.r-2;return;}
  ball.x+=ball.vx;ball.y+=ball.vy;
  // walls
  if(ball.x-ball.r<0){ball.x=ball.r;ball.vx=Math.abs(ball.vx);}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx);}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.vy=Math.abs(ball.vy);}
  // paddle
  if(ball.vy>0&&ball.y+ball.r>=paddle.y&&ball.y+ball.r<=paddle.y+PADDLE_H+4&&ball.x>=paddle.x&&ball.x<=paddle.x+pw()){
    const rel=(ball.x-paddle.x)/pw()-0.5;
    const spd=Math.sqrt(ball.vx**2+ball.vy**2);
    ball.vx=rel*spd*2.2;ball.vy=-Math.abs(ball.vy);ball.y=paddle.y-ball.r-1;
  }
  // bricks
  for(const b of bricks){
    if(!b.alive)continue;
    if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){
      b.hp--;if(b.hp<=0){b.alive=false;score+=10;if(score>best){best=score;localStorage.setItem('bb_best',best);}}
      const fromLeft=Math.abs((ball.x+ball.r)-b.x),fromRight=Math.abs((ball.x-ball.r)-(b.x+b.w));
      const fromTop=Math.abs((ball.y+ball.r)-b.y),fromBot=Math.abs((ball.y-ball.r)-(b.y+b.h));
      const m=Math.min(fromLeft,fromRight,fromTop,fromBot);
      if(m===fromLeft||m===fromRight)ball.vx*=-1;else ball.vy*=-1;
      break;
    }
  }
  // floor
  if(ball.y-ball.r>H){
    lives--;ball.active=false;
    if(lives<=0){state='dead';if(score>best){best=score;localStorage.setItem('bb_best',best);}}
    else{setupLevel();}
  }
  // level complete
  if(bricks.every(b=>!b.alive)){level++;setupLevel();state='next';}
}

function loop(){
  cancelAnimationFrame(raf);
  drawBG();drawBricks();drawPaddle();drawBall();drawHUD();
  if(state==='playing'){update();}
  else if(state==='idle'){drawOverlay('Brick Break','Click/Tap to Launch');}
  else if(state==='dead'){drawOverlay('Game Over','Score: '+score);}
  else if(state==='next'){drawBricks();drawOverlay('Level '+(level-1)+' Clear','Score: '+score);}
  raf=requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
